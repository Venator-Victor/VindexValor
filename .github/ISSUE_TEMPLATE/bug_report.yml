name: "🐛 Bug report / Relatório de bug"
description: "Report a problem with VindexValor / Relate um problema no VindexValor"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Description / Descrição"
      description: "A clear and concise description of what the bug is. / Uma descrição clara e concisa do que é o bug."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce / Passos para reproduzir"
      description: "How can we reproduce the behavior? / Como podemos reproduzir o comportamento?"
      placeholder: |
        1. Go to '...' / Vá até '...'
        2. Click on '...' / Clique em '...'
        3. Scroll down to '...' / Role até '...'
        4. See error / Veja o erro
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior / Comportamento esperado"
      description: "What did you expect to happen? / O que você esperava que acontecesse?"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / Capturas de tela"
      description: "If applicable, add screenshots to help explain the problem. / Se aplicável, adicione capturas de tela para ajudar a explicar o problema."
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: "Browser / Navegador"
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other / Outro
    validations:
      required: false

  - type: input
    id: browser-version
    attributes:
      label: "Browser version / Versão do navegador"
      placeholder: "e.g. 128 / ex. 128"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: "Operating system / Sistema operacional"
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - Other / Outro
    validations:
      required: false

  - type: textarea
    id: console-errors
    attributes:
      label: "Browser console errors / Erros no console do navegador"
      description: "Paste any errors from the browser dev tools console, if any. / Cole os erros do console de ferramentas do desenvolvedor do navegador, se houver."
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional context / Contexto adicional"
      description: "Add any other context about the problem here. / Adicione qualquer outro contexto sobre o problema aqui."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I searched existing issues and this bug hasn't been reported yet / Procurei nas issues existentes e esse bug ainda não foi reportado"
          required: true