<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#3B82F6" stroke-width="10" filter="url(#glow)"></circle>

  <!-- Inner Secondary Ring -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="#3B82F6" stroke-width="6" opacity="0.9" filter="url(#glow)"></circle>

  <!-- Dashed Segment -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="#3B82F6" stroke-width="6" stroke-dasharray="18 12" stroke-linecap="round" transform="rotate(-35 256 256)" filter="url(#glow)"></circle>

  <!-- Horizontal Axis -->
  <line x1="40" y1="256" x2="472" y2="256" stroke="#3B82F6" stroke-width="6" filter="url(#glow)"></line>

  <!-- Diagonal Axis -->
  <line x1="86" y1="426" x2="426" y2="86" stroke="#3B82F6" stroke-width="6" filter="url(#glow)"></line>

  <!-- Inner Orbits -->
  <ellipse cx="256" cy="256" rx="120" ry="60" fill="none" stroke="#8B5CF6" stroke-width="8" transform="rotate(30 256 256)" filter="url(#glow)"></ellipse>

  <ellipse cx="256" cy="256" rx="120" ry="60" fill="none" stroke="#3B82F6" stroke-width="8" transform="rotate(-30 256 256)" filter="url(#glow)"></ellipse>

  <!-- Core -->
  <circle cx="256" cy="256" r="20" fill="#8B5CF6" filter="url(#glow)"></circle>

</svg>
